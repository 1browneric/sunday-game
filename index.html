<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Sunday Game — Sunflower Hills</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Graduate&family=Barlow:wght@400;500;600;700&family=Spline+Sans+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<!-- Home-screen icon (Sunday Golf sunflower) -->
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sunday Game">
<meta name="theme-color" content="#0E2418">
<style>
:root{
  --pine:#0E2418; --fair:#17402A; --fair2:#1D4E34;
  --cream:#F5EFDD; --cream-dim:#D8D0B8;
  --gold:#E3A812; --gold-deep:#B37F06;
  --clay:#D06A45; --sage:#7E9C89; --line:rgba(245,239,221,.14);
  --target:#1668D9;
  --mono:'Spline Sans Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--pine);color:var(--cream);font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased}
.app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;
  background:radial-gradient(120% 60% at 50% -10%, #1B4A30 0%, var(--pine) 60%)}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
button:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}

.masthead{padding:22px 18px 14px;text-align:center;border-bottom:1px solid var(--line)}
.eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.32em;color:var(--sage);text-transform:uppercase}
.wordmark{font-family:'Graduate',serif;font-size:30px;line-height:1.1;letter-spacing:.04em;color:var(--cream);margin:6px 0 4px}
.wordmark em{font-style:normal;color:var(--gold)}
.sub{font-family:var(--mono);font-size:11px;color:var(--cream-dim);letter-spacing:.08em}

.tabs{display:flex;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5;
  background:rgba(14,36,24,.94);backdrop-filter:blur(6px)}
.tab{flex:1;padding:13px 0 11px;font-family:var(--mono);font-size:11px;letter-spacing:.22em;
  text-transform:uppercase;color:var(--sage);border-bottom:2px solid transparent}
.tab.on{color:var(--gold);border-bottom-color:var(--gold)}

.main{flex:1;padding:16px 14px 90px}

.pot{display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,#1D4E34,#153B27);
  border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:16px}
.coin{width:54px;height:54px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at 35% 30%, #F6C94A, var(--gold) 55%, var(--gold-deep));
  box-shadow:0 0 0 3px rgba(227,168,18,.25), inset 0 -3px 6px rgba(0,0,0,.25);
  font-family:'Graduate',serif;font-size:22px;color:#3A2A00}
.pot .lbl{font-family:var(--mono);font-size:10px;letter-spacing:.28em;color:var(--sage);text-transform:uppercase}
.pot .desc{font-size:13px;color:var(--cream-dim);margin-top:3px;line-height:1.35}
.pot .desc b{color:var(--cream)}

.holecard{background:var(--cream);color:#22301F;border-radius:16px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.35)}
.holehead{display:flex;align-items:baseline;justify-content:space-between;padding:14px 16px 10px;border-bottom:1px dashed rgba(34,48,31,.25)}
.holenum{font-family:'Graduate',serif;font-size:34px;line-height:1;color:#17402A}
.holemeta{font-family:var(--mono);font-size:12px;color:#4B5B44;text-align:right;line-height:1.5}
.holemeta b{color:#17402A}
.ptbadge{display:inline-block;font-family:var(--mono);font-weight:700;font-size:11px;
  background:#17402A;color:var(--gold);border-radius:999px;padding:3px 10px;letter-spacing:.12em}
.prow{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid rgba(34,48,31,.12)}
.prow:last-child{border-bottom:none}
.pname{flex:1;min-width:0}
.pname .nm{font-weight:700;font-size:16px;color:#22301F}
.dots{margin-top:2px;height:8px;display:flex;gap:4px}
.dot{width:7px;height:7px;border-radius:50%;background:#B7842A}
.netchip{font-family:var(--mono);font-size:11px;color:#4B5B44;min-width:58px;text-align:right}
.step{display:flex;align-items:center;gap:8px}
.stepbtn{width:44px;height:44px;border-radius:12px;background:#17402A;color:var(--cream);
  font-size:22px;font-weight:600;display:flex;align-items:center;justify-content:center}
.stepbtn:active{transform:scale(.95)}
.gross{width:52px;text-align:center;font-family:var(--mono);font-weight:700;font-size:26px;color:#22301F}
.gross.blank{color:#9AA292}.gross.birdie{color:#B37F06}.gross.over{color:#B0432E}
.holenav{display:flex;align-items:center;gap:10px}
.holenav.top{margin-bottom:12px}
.holenav.bottom{margin-top:16px}
.holenav .navbtn{flex:1;padding:13px 0;border-radius:11px;background:var(--fair2);color:var(--cream);
  font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;
  border:1px solid var(--line);text-align:center}
.holenav .navbtn.dis{opacity:.4}
.navnow{flex:none;font-family:'Graduate',serif;font-weight:700;font-size:17px;color:var(--gold);
  min-width:60px;text-align:center}
.resline{margin-top:12px;text-align:center;font-family:var(--mono);font-size:12px;color:var(--sage);min-height:18px}
.resline b{color:var(--gold)}

/* ---- Course book (hole diagram / green map / pin sheet) ---- */
.book{margin-top:14px;background:var(--cream);border-radius:16px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.35)}
.bookbar{display:flex;align-items:stretch;border-bottom:1px solid rgba(34,48,31,.15);background:#EDE6D0}
.bookseg{flex:1;padding:12px 0 11px;font-family:var(--mono);font-size:10px;letter-spacing:.1em;
  text-transform:uppercase;color:#4B5B44;border-bottom:2px solid transparent}
.bookseg.on{background:var(--cream);color:#17402A;font-weight:700;border-bottom-color:var(--gold)}
.bookzoombtn{flex:none;width:52px;font-family:var(--mono);font-size:15px;color:#4B5B44;border-left:1px solid rgba(34,48,31,.15)}
.bookbody{padding:10px 10px 12px}
.bookframe{position:relative;border-radius:10px;overflow:hidden;background:#fff}
.bookimg{width:100%;display:block;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
.greentap{cursor:crosshair}
.pinmark{position:absolute;width:26px;height:34px;margin-left:-4px;margin-top:-31px;pointer-events:none;
  filter:drop-shadow(0 1px 2px rgba(0,0,0,.45))}
.targetmark{position:absolute;width:24px;height:24px;margin:-12px 0 0 -12px;border:2.5px dashed var(--target);
  border-radius:50%;pointer-events:none;box-shadow:0 0 0 1.5px rgba(255,255,255,.65) inset}
.targetmark:after{content:"";position:absolute;left:50%;top:50%;width:4px;height:4px;margin:-2px 0 0 -2px;
  border-radius:50%;background:var(--target)}
.bookhint{font-family:var(--mono);font-size:10.5px;color:#4B5B44;padding:9px 4px 0;line-height:1.6;text-align:center}
.bookhint b{color:#17402A}
.bookhint .pinlgnd{color:var(--gold-deep);font-weight:700}
.bookhint .tgtlgnd{color:var(--target);font-weight:700}
.pinclear{display:block;margin:8px auto 0;padding:7px 16px;border:1px solid rgba(176,67,46,.45);border-radius:999px;
  color:#B0432E;font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase}

/* stats entry */
.strow{padding:11px 4px;border-bottom:1px solid rgba(34,48,31,.12)}
.strow:last-child{border-bottom:none}
.sttop{display:flex;align-items:center;gap:8px}
.stname{font-weight:700;font-size:15px;color:#22301F;flex:1}
.stchips{display:flex;gap:6px}
.stchip{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;
  padding:8px 11px;border-radius:999px;border:1.5px solid rgba(34,48,31,.3);color:#4B5B44}
.stchip.on{background:#17402A;border-color:#17402A;color:var(--gold);font-weight:700}
.stchip.off{border-color:rgba(176,67,46,.55);color:#B0432E;text-decoration:line-through}
.stbottom{display:flex;align-items:center;gap:16px;margin-top:9px}
.stcount{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:10px;color:#4B5B44;
  text-transform:uppercase;letter-spacing:.08em}
.stcount b{font-family:var(--mono);font-size:15px;color:#22301F;min-width:18px;text-align:center}
.stmini{width:34px;height:34px;border-radius:9px;background:#EDE6D0;color:#17402A;font-size:17px;
  font-weight:700;display:flex;align-items:center;justify-content:center}
.stmini:active{transform:scale(.94)}
.sttot{font-family:var(--mono);font-size:9.5px;color:#7E8A76;margin-top:7px;letter-spacing:.04em}

/* strategy tab + pin read */
.strat{padding:2px 2px}
.stratsec{padding:10px 6px;border-bottom:1px solid rgba(34,48,31,.12)}
.stratsec:last-child{border-bottom:none}
.stratlbl{font-family:var(--mono);font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:#7E8A76;margin-bottom:6px}
.stratrow{font-family:'Barlow',sans-serif;font-size:13.5px;color:#22301F;line-height:1.5;padding:3px 0}
.stratrow b{color:#17402A;font-weight:700}
.stratrow.warn{color:#B0432E}
.stratrow.warn b{color:#B0432E}
.pintip{font-family:'Barlow',sans-serif;font-size:12.5px;color:#22301F;line-height:1.5;
  background:#EDE6D0;border-left:3px solid var(--gold-deep);border-radius:8px;padding:9px 11px;margin-top:9px}
.pintip b{color:#17402A}
.statsblock{margin-top:14px}
.statshdr{padding:13px 16px 11px;font-family:var(--mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;
  color:#17402A;font-weight:700;border-bottom:1px solid rgba(34,48,31,.15);background:#EDE6D0;border-radius:16px 16px 0 0}

/* fullscreen zoom overlay */
.zoom{position:fixed;inset:0;z-index:50;background:rgba(10,24,16,.97);display:flex;flex-direction:column;
  max-width:520px;margin:0 auto}
.zoomhead{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;flex:none}
.zoomttl{font-family:var(--mono);font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--sage)}
.zoomclose{padding:8px 18px;border:1px solid var(--line);border-radius:999px;color:var(--cream);
  font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase}
.zoombody{flex:1;overflow-y:auto;padding:0 14px 20px}
.zoombody .bookframe{border-radius:12px}
.zoombody .bookhint{color:var(--cream-dim)}
.zoombody .bookhint b{color:var(--cream)}
.zoombody .pinclear{border-color:rgba(208,106,69,.5);color:var(--clay)}

.ptable{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12.5px}
.ptable th{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--sage);
  text-align:left;padding:8px 6px;border-bottom:1px solid var(--line);font-weight:500}
.ptable td{padding:9px 6px;border-bottom:1px solid rgba(245,239,221,.07);color:var(--cream-dim)}
.ptable td.c,.ptable th.c{text-align:center}
.win{color:var(--gold);font-weight:700}
.carry{color:var(--clay)}
.standings{display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
.standrow{display:flex;align-items:center;gap:14px;background:var(--fair2);border:1px solid var(--line);border-radius:14px;padding:14px 16px}
.standrow.leader{border-color:rgba(227,168,18,.55);background:linear-gradient(135deg,#254E2F,#1B4229)}
.rank{font-family:'Graduate',serif;font-size:18px;color:var(--sage);width:22px}
.leader .rank{color:var(--gold)}
.standname{font-weight:700;font-size:17px}
.standhcp{font-family:var(--mono);font-size:11px;color:var(--sage)}
.standpts{font-family:'Graduate',serif;font-size:28px;color:var(--cream)}
.leader .standpts{color:var(--gold)}
.secthead{font-family:var(--mono);font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--sage);margin:20px 0 10px}

.gridwrap{overflow-x:auto;background:var(--cream);border-radius:14px;padding:6px 4px}
.grid{border-collapse:collapse;font-family:var(--mono);font-size:12px;color:#22301F;min-width:100%}
.grid th{font-size:9px;letter-spacing:.14em;color:#4B5B44;padding:6px 5px;text-transform:uppercase;
  border-bottom:1.5px solid #17402A;text-align:center;font-weight:600}
.grid td{padding:6px 5px;text-align:center;border-bottom:1px solid rgba(34,48,31,.14)}
.grid td.hn{font-weight:700;color:#17402A}
.grid tr.sumrow td{border-top:2px solid #17402A;font-weight:700;color:#17402A}
.sc{font-weight:700;position:relative}
.sc.bird{color:#B37F06}.sc.bog{color:#B0432E}
.sc.won:after{content:"";position:absolute;top:2px;right:1px;width:5px;height:5px;border-radius:50%;background:var(--gold)}
.strokemark{font-size:9px;color:#B7842A;vertical-align:super}
.legend{font-family:var(--mono);font-size:10.5px;color:var(--sage);margin-top:10px;line-height:1.7}
.legend i{font-style:normal;color:var(--gold)}
.reset{margin-top:26px;width:100%;padding:12px;border:1px solid rgba(208,106,69,.5);
  border-radius:12px;color:var(--clay);font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase}
.savestat{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
  font-family:var(--mono);font-size:10px;letter-spacing:.24em;text-transform:uppercase;
  color:var(--sage);background:rgba(14,36,24,.9);padding:6px 14px;border-radius:999px;border:1px solid var(--line)}
.savestat.live{color:var(--gold);border-color:rgba(227,168,18,.4)}
</style>
</head>
<body>
<div class="app">
  <header class="masthead">
    <h1 class="wordmark">The Sunday <em>Game</em></h1>
    <div class="sub">Sunflower Hills &middot; Bonner Springs, KS</div>
    <div class="sub">Sunday, July 12, 2026</div>
  </header>
  <nav class="tabs" role="tablist">
    <button class="tab on" data-tab="score" role="tab">Score</button>
    <button class="tab" data-tab="points" role="tab">Points</button>
    <button class="tab" data-tab="card" role="tab">Card</button>
  </nav>
  <main class="main" id="main"></main>
  <div class="savestat" id="savestat" role="status">Loading</div>
</div>

const HOLES = [
  {n:1,par:4,si:3},{n:2,par:5,si:13},{n:3,par:4,si:7},{n:4,par:3,si:17},

];
const PLAYERS = [
  {id:"eric",name:"Eric",hcp:8},
  {id:"jimmy",name:"Jimmy",hcp:12},
  {id:"brandon",name:"Brandon",hcp:18}
];
const ptsFor = si => si<=6?3 : si<=12?2 : 1;

const ALLOWANCE = 0.8; // 80% of course handicap
const playHcp = p => Math.round(p.hcp * ALLOWANCE);
const STROKES = (() => {
  const eligible = HOLES.filter(h=>h.par!==3).slice().sort((a,b)=>a.si-b.si);
  const map = {};
  for (const p of PLAYERS){
    map[p.id] = {};
    const ph = playHcp(p);
    const base = Math.floor(ph/eligible.length), extra = ph%eligible.length;
    eligible.forEach((h,i)=>{ map[p.id][h.n] = base + (i<extra?1:0); });
    HOLES.filter(h=>h.par===3).forEach(h=>{ map[p.id][h.n] = 0; });
  }
  return map;
})();

/* ---------- state ----------
   Cell model: every score is {v, t} keyed "hole.pid" so edits from
   different phones merge cleanly (latest write per cell wins).
   Pins ride the same channel as "pin.<hole>" cells whose v is
   {x, y} normalized to the green map (or null = pin cleared).
   Stats ride as "st.<hole>.<pid>.<key>" cells with numeric v
   (tee/fw/gir: 1 or 0; putts/pen: counts). */
let state = { cells: {}, resetAt: 0 };
let scores = {};      // derived: { holeN: { pid: gross } }
let pins = {};        // derived: { holeN: {x, y} }
let stats = {};       // derived: { holeN: { pid: {tee,fw,gir,putts,pen} } }
let tab = "score";
let hole = 1;
let bookView = "hole";  // hole | green | pins
let bookZoom = false;
let mode = "connecting"; // live | offline | connecting

const isPinKey = k => k.startsWith("pin.");
const validPinVal = v => v === null ||
  (v && typeof v.x === "number" && typeof v.y === "number" && isFinite(v.x) && isFinite(v.y));

function derive(){
  scores = {}; pins = {}; stats = {};
  for (const [k, c] of Object.entries(state.cells)){
    if (c.t <= state.resetAt) continue;
    if (isPinKey(k)){
      const hn = k.slice(4);
      if (c.v) pins[hn] = c.v;
      continue;
    }
    if (k.startsWith("st.")){
      const [, hn, pid, key] = k.split(".");
      if (!stats[hn]) stats[hn] = {};
      if (!stats[hn][pid]) stats[hn][pid] = {};
      stats[hn][pid][key] = c.v;
      continue;
    }
    const [hn, pid] = k.split(".");
    if (!scores[hn]) scores[hn] = {};
    scores[hn][pid] = c.v;
  }
}
function merge(incoming){
  if (!incoming || typeof incoming !== "object") return false;
  let changed = false;
  if ((incoming.resetAt||0) > state.resetAt){ state.resetAt = incoming.resetAt; changed = true; }
  for (const [k, c] of Object.entries(incoming.cells || {})){
    if (!c) continue;
    const ok = isPinKey(k) ? validPinVal(c.v) : typeof c.v === "number";
    if (ok && (!state.cells[k] || c.t > state.cells[k].t)){
      state.cells[k] = c; changed = true;
    }
  }
  if (changed) derive();
  return changed;
}

const LS_KEY = "sfh_sunday_game_2026_07_12_v2";
function lsLoad(){ try{ const s = JSON.parse(localStorage.getItem(LS_KEY)); if (s && s.cells) state = s; }catch(e){} derive(); }
function lsSave(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }catch(e){} }

/* ---------- points engine ---------- */
function runPoints(){
  const totals = Object.fromEntries(PLAYERS.map(p=>[p.id,0]));
  const holeResults = {};
  let pot = 0, resolvedThru = 0;
  for (const h of HOLES){
    const s = scores[h.n] || {};
    if (!PLAYERS.every(p=>s[p.id]!=null)) break;
    pot += ptsFor(h.si);
    const nets = PLAYERS.map(p=>({id:p.id, net:s[p.id]-STROKES[p.id][h.n]}));
    const low = Math.min(...nets.map(x=>x.net));
    const winners = nets.filter(x=>x.net===low);
    if (winners.length===1){ totals[winners[0].id]+=pot; holeResults[h.n]={winner:winners[0].id,pot}; pot=0; }
    else { holeResults[h.n]={carry:true,pot}; }
    resolvedThru = h.n;
  }
  return {totals, holeResults, pot, resolvedThru};
}
function totalsFor(pid){
  let g=0,n=0,thru=0;
  for (const h of HOLES){
    const v = scores[h.n]?.[pid];
    if (v==null) break;
    g+=v; n+=v-STROKES[pid][h.n]; thru=h.n;
  }
  return {g,n,thru};
}

/* ---------- suggested target ----------
   Aim spot = pin pulled 45% toward the green's center of mass
   (precomputed per hole from the contour map) — play to the fat
   side instead of hunting the flag. */
function targetFor(holeN){
  const p = pins[holeN], meta = BOOK[holeN];
  if (!p || !meta) return null;
  const [cx, cy] = meta.c;
  return { x: p.x + (cx - p.x)*0.45, y: p.y + (cy - p.y)*0.45 };
}

/* green pin read: sample the elevation heatmap at the pin (red=high, blue=low) */
const _greenImgCache = {};
function sampleGreen(holeN, x, y){
  const meta = BOOK[holeN];
  if (!meta) return null;
  let ctx = _greenImgCache[holeN];
  if (!ctx){
    const img = _greenImgCache["_img_"+holeN];
    if (!img || !img.complete || !img.naturalWidth) return null;
    const cv = document.createElement("canvas");
    cv.width = img.naturalWidth; cv.height = img.naturalHeight;
    ctx = cv.getContext("2d", { willReadFrequently:true });
    ctx.drawImage(img, 0, 0);
    _greenImgCache[holeN] = ctx;
  }
  try {
    const W = ctx.canvas.width, H = ctx.canvas.height, rad = Math.max(3, Math.round(W*0.03));
    const px = Math.round(x*W), py = Math.round(y*H);
    const d = ctx.getImageData(Math.max(0,px-rad), Math.max(0,py-rad), rad*2, rad*2).data;
    let r=0,g=0,b=0,n=0;
    for (let i=0;i<d.length;i+=4){ if (d[i+3]<10) continue; r+=d[i]; g+=d[i+1]; b+=d[i+2]; n++; }
    return n ? { r:r/n, g:g/n, b:b/n } : null;
  } catch(e){ return null; }
}
function pinAdvice(holeN){
  const p = pins[holeN];
  if (!p) return null;
  const col = sampleGreen(holeN, p.x, p.y);
  const front = p.y > 0.60, back = p.y < 0.40;
  const parts = [];
  if (col){
    const high = col.r > col.b + 22 && col.r > 140;
    const low  = col.b > col.r + 18 && col.b > 130;
    if (high) parts.push("Pin's on the <b>high shelf</b> — downhill, slick putts. Leave it <b>below the hole</b> and lag the first one.");
    else if (low) parts.push("Pin sits <b>low</b> — uphill putt, be firm and take the break out.");
    else parts.push("Pin's on a <b>flatter section</b> — a makeable look if you're on the right tier.");
  }
  if (back) parts.push("Back pin: take one more club, don't short-side yourself.");
  else if (front) parts.push("Front pin: land it soft — long leaves a downhill comeback.");
  parts.push("Blue ring = the fat-side target; play there, not at the flag.");
  return parts.join(" ");
}
function strategyFor(h){
  const intel = HOLE_INTEL[h.n] || {}, slope = GREEN_SLOPES[h.n], secs = [];
  const sec = (label, body) => secs.push(`<div class="stratsec"><div class="stratlbl">${label}</div>${body}</div>`);
  if (intel.tee) sec("How to play it", `<div class="stratrow">${intel.tee}</div>`);
  if (intel.avoid) sec("Where the strokes go", `<div class="stratrow warn">${intel.avoid}</div>`);
  if (intel.note) sec("The call", `<div class="stratrow">${intel.note}</div>`);
  if (slope) sec("The green", `<div class="stratrow">High side: <b>${slope.high}</b> &middot; low side: <b>${slope.low}</b>. Everything feeds toward the low side.</div>`);
  const tip = pinAdvice(h.n);
  sec("Today's pin", `<div class="stratrow">${tip || "Drop the pin on the GREEN tab for a putt read here."}</div>`);
  return `<div class="strat">${secs.join("")}</div>`;
}

/* round-so-far stat line for one player */
function statTotals(pid){
  let teeG=0,teeN=0,fwG=0,fwN=0,girG=0,girN=0,putts=0,puttN=0,pen=0;
  for (const h of HOLES){
    const d = stats[h.n]?.[pid];
    if (!d) continue;
    if (d.tee!=null){ teeN++; teeG+=d.tee; }
    if (d.fw!=null){ fwN++; fwG+=d.fw; }
    if (d.gir!=null){ girN++; girG+=d.gir; }
    if (d.putts!=null){ puttN++; putts+=d.putts; }
    if (d.pen!=null) pen+=d.pen;
  }
  const parts = [];
  if (teeN) parts.push(`Tee ${teeG}/${teeN}`);
  if (fwN) parts.push(`FW ${fwG}/${fwN}`);
  if (girN) parts.push(`GIR ${girG}/${girN}`);
  if (puttN) parts.push(`${putts} putt${putts===1?"":"s"}`);
  if (pen) parts.push(`${pen} pen`);
  return parts.length ? "Round: " + parts.join(" &middot; ") : "";
}

function viewCard(game){
  const head = PLAYERS.map(p=>`<th>${p.name}</th>`).join("");

    const r = game.holeResults[h.n];

function bind(){
  const h = HOLES[hole-1];
  document.querySelectorAll("[data-act]").forEach(el=>{
    el.onclick = () => {
      const act = el.dataset.act, pid = el.dataset.pid;
      if (act==="prev") { hole=Math.max(1,hole-1); render(); }
      else if (act==="next") { hole=Math.min(18,hole+1); render(); }
      else if (act==="reset") clearRound();
      else if (act==="zoom") { bookZoom = true; render(); }
      else if (act==="zoomclose") { bookZoom = false; render(); }
      else if (act==="pinclear") clearPin(hole);
      else if (act==="sttog"){
        const key = el.dataset.key;
        const cur = stats[hole]?.[pid]?.[key];
        setStat(hole, pid, key, cur===1 ? 0 : 1);
      }
      else if (act==="stinc"||act==="stdec"){
        const key = el.dataset.key;
        const cur = stats[hole]?.[pid]?.[key] ?? 0;
        setStat(hole, pid, key, Math.max(0, Math.min(12, cur + (act==="stinc"?1:-1))));
      }
      else if (act==="inc"||act==="dec"){
        const cur = scores[hole]?.[pid];
        if (cur==null) setScore(hole, pid, h.par);
        else setScore(hole, pid, Math.max(1, Math.min(12, cur + (act==="inc"?1:-1))));
      }
    };
  });
  document.querySelectorAll("[data-view]").forEach(el=>{
    el.onclick = () => { bookView = el.dataset.view; render(); };
  });
  document.querySelectorAll('[data-role="greentap"]').forEach(el=>{
    el.onclick = ev => {
      const r = el.getBoundingClientRect();
      const x = (ev.clientX - r.left) / r.width;
      const y = (ev.clientY - r.top) / r.height;
      if (x>=0 && x<=1 && y>=0 && y<=1) setPin(hole, x, y);
    };
  });
}

document.querySelectorAll(".tab").forEach(b=>{
  b.addEventListener("click", ()=>{ tab=b.dataset.tab; bookZoom=false; render(); });
});

/* ---------- boot ---------- */
lsLoad();
/* preload green heatmaps so the pin read works on any tab, not just Green */
for (let hn = 1; hn <= 18; hn++){
  if (BOOK[hn]){ const im = new Image(); im.src = BOOK[hn].green; _greenImgCache["_img_"+hn] = im; }
}
const firstOpen = HOLES.find(h=>!PLAYERS.every(p=>scores[h.n]?.[p.id]!=null));
hole = firstOpen ? firstOpen.n : 18;
render();

/* Catch up on anything published in the last 12h, then stream live. */
(async () => {
  try {
    const r = await fetch(`${NTFY}/${TOPIC}/json?poll=1&since=all`);
    const text = await r.text();
    let changed = false;
    for (const line of text.split("\n")){
      if (!line.trim()) continue;
      try {
        const env = JSON.parse(line);
        if (env.event === "message") changed = merge(JSON.parse(env.message)) || changed;
      } catch(e){}
    }
    mode = "live";
    if (changed) lsSave();
    render();
  } catch(e){ mode = "offline"; render(); }

  try {
    const es = new EventSource(`${NTFY}/${TOPIC}/sse`);
    es.onmessage = ev => {
      try {
        const env = JSON.parse(ev.data);
        if (env.event !== "message") return;
        if (merge(JSON.parse(env.message))){ lsSave(); render(); }
      } catch(e){}
    };
    es.onopen = () => { if (mode !== "live"){ mode = "live"; render(); } };
    es.onerror = () => { if (mode === "live"){ mode = "connecting"; render(); } };
  } catch(e){}

  /* Safety net: if the relay's 12h cache rolled over, whoever holds
     scores locally re-seeds the channel on next open. */
  if (Object.keys(state.cells).length) publish();
})();
</script>
